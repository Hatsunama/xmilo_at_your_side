name: Release Sidecar

# Trigger: push a tag like v0.1.0
# git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          # Primary Android target — almost all modern Android phones
          - arch: arm64
            GOOS: android
            GOARCH: arm64
            asset_name: xmilo-sidecar-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate open-source release hygiene
        shell: pwsh
        run: ./scripts/android/validate_open_source_release.ps1

      - name: Verify Go module files are tidy
        working-directory: sidecar-go
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        working-directory: sidecar-go
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
          GOARM: ${{ matrix.GOARM || '' }}
          CGO_ENABLED: 0
        run: |
          go build \
            -buildmode=pie \
            -trimpath \
            -ldflags="-s -w -X xmilo/sidecar-go/internal/buildinfo.Version=${{ github.ref_name }}" \
            -o ../dist/${{ matrix.asset_name }} \
            ./cmd/xmilo_sidecar

      - name: SHA256 checksum
        run: |
          mkdir -p dist
          cd dist
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          cat ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          retention-days: 1

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: xMilo Sidecar ${{ github.ref_name }}
          body: |
            ## xMilo Sidecar ${{ github.ref_name }}

            This release publishes the sidecar binary and checksum for the xMilo
            app-owned backend terminal/runtime host. No standalone user install
            script is published from this workflow.

            ### Manual download
            | Architecture | File | Notes |
            |---|---|---|
            | arm64 | `xmilo-sidecar-arm64` | Most Android phones (2017+) |

            Verify your download:
            ```bash
            sha256sum -c xmilo-sidecar-arm64.sha256
            ```
          files: |
            dist/xmilo-sidecar-arm64
            dist/xmilo-sidecar-arm64.sha256
          draft: false
          prerelease: false
