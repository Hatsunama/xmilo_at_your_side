name: Release Sidecar

# Trigger: push a tag like v0.1.0
# git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          # Primary Android target — almost all modern Android phones
          - arch: arm64
            GOOS: linux
            GOARCH: arm64
            asset_name: picoclaw-arm64

          # Older 32-bit Android phones
          - arch: arm
            GOOS: linux
            GOARCH: arm
            GOARM: "7"
            asset_name: picoclaw-arm

          # x86_64 — emulators and edge cases
          - arch: amd64
            GOOS: linux
            GOARCH: amd64
            asset_name: picoclaw-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Ensure go.sum exists
        working-directory: sidecar-go
        run: go mod tidy

      - name: Build
        working-directory: sidecar-go
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
          GOARM: ${{ matrix.GOARM || '' }}
          CGO_ENABLED: 0
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/${{ matrix.asset_name }} \
            ./cmd/picoclaw

      - name: SHA256 checksum
        run: |
          mkdir -p dist
          cd dist
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          cat ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          retention-days: 1

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: xMilo Sidecar ${{ github.ref_name }}
          body: |
            ## xMilo Sidecar ${{ github.ref_name }}

            ### Install
            On your Android phone in Termux:
            ```bash
            curl -fsSL https://xmiloatyourside.com/install.sh | bash
            ```

            ### Manual download
            | Architecture | File | Notes |
            |---|---|---|
            | arm64 | `picoclaw-arm64` | Most Android phones (2017+) |
            | arm | `picoclaw-arm` | Older 32-bit Android phones |
            | amd64 | `picoclaw-amd64` | x86_64 emulators |

            Verify your download:
            ```bash
            sha256sum -c picoclaw-arm64.sha256
            ```
          files: |
            dist/picoclaw-arm64
            dist/picoclaw-arm64.sha256
            dist/picoclaw-arm
            dist/picoclaw-arm.sha256
            dist/picoclaw-amd64
            dist/picoclaw-amd64.sha256
          draft: false
          prerelease: false
