apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()
def xmiloRepoRoot = rootDir.getAbsoluteFile().getParentFile().getParentFile().getParentFile().getAbsolutePath()
def xmiloRelayBaseUrl = System.getenv("EXPO_PUBLIC_RELAY_BASE_URL") ?: findProperty("EXPO_PUBLIC_RELAY_BASE_URL") ?: "http://127.0.0.1:8080"
def xmiloBuildConfigString = { value ->
    "\"${(value ?: "").replace("\\", "\\\\").replace("\"", "\\\"")}\""
}
def xmiloRequiredMindFiles = [
    "IDENTITY.md",
    "SOUL.md",
    "SECURITY.md",
    "TOOLS.md",
    "USER.md",
]

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('hermes-compiler/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
    // Use Expo CLI to bundle the app, this ensures the Metro config
    // works correctly with Expo projects.
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"

    /* Folders */
     //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]

    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true in release builds to optimize the app using [R8](https://developer.android.com/topic/performance/app-optimization/enable-app-optimization).
 */
def enableMinifyInReleaseBuilds = (findProperty('android.enableMinifyInReleaseBuilds') ?: false).toBoolean()

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'com.hatsunama.xmilo.dev'
    defaultConfig {
        applicationId 'com.hatsunama.xmilo.dev'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
          versionCode 6
        versionName "0.1.5"

        buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty('reactNativeReleaseLevel') ?: 'stable'}\""
        buildConfigField "String", "DEFAULT_RELAY_BASE_URL", xmiloBuildConfigString(xmiloRelayBaseUrl)
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            def storeFilePath = System.getenv("XMILO_RELEASE_STORE_FILE") ?: findProperty("XMILO_RELEASE_STORE_FILE")
            def storePasswordValue = System.getenv("XMILO_RELEASE_STORE_PASSWORD") ?: findProperty("XMILO_RELEASE_STORE_PASSWORD")
            def keyAliasValue = System.getenv("XMILO_RELEASE_KEY_ALIAS") ?: findProperty("XMILO_RELEASE_KEY_ALIAS")
            def keyPasswordValue = System.getenv("XMILO_RELEASE_KEY_PASSWORD") ?: findProperty("XMILO_RELEASE_KEY_PASSWORD")

            if (storeFilePath) {
                storeFile file(storeFilePath)
            }
            if (storePasswordValue) {
                storePassword storePasswordValue
            }
            if (keyAliasValue) {
                keyAlias keyAliasValue
            }
            if (keyPasswordValue) {
                keyPassword keyPasswordValue
            }
        }
    }

    flavorDimensions += "dist"
    productFlavors {
        internal {
            dimension "dist"
            applicationIdSuffix ".internal"
            versionNameSuffix "-internal"
            signingConfig signingConfigs.debug
            // Internal builds use a fixed local token to simplify phone validation.
            // This is NOT used for Play builds.
            buildConfigField "String", "DEFAULT_CASTLE_WS_URL", "\"ws://127.0.0.1:42817/ws\""
        }
        play {
            dimension "dist"
            // Play build must not be debug-signed. This is enforced below.
            signingConfig signingConfigs.release
            buildConfigField "String", "DEFAULT_CASTLE_WS_URL", "\"\""
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        // "phone" is a validation build: it embeds the JS bundle like release (no Metro/DevLauncher),
        // but stays debug-signed so we can iterate quickly on a physical device.
        phone {
            initWith release
            // Keep debug *signing* for faster device iteration, but build native + JS as release-like
            // so we don't mix debug-only React renderer symbols with release-prefab artifacts.
            debuggable false
            jniDebuggable false
            signingConfig signingConfigs.debug
            matchingFallbacks = ["release"]
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            def enableShrinkResources = findProperty('android.enableShrinkResourcesInReleaseBuilds') ?: 'false'
            shrinkResources enableShrinkResources.toBoolean()
            minifyEnabled enableMinifyInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            def enablePngCrunchInRelease = findProperty('android.enablePngCrunchInReleaseBuilds') ?: 'true'
            crunchPngs enablePngCrunchInRelease.toBoolean()
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
}

afterEvaluate {
    def requested = gradle.startParameter.taskNames.join(" ").toLowerCase()
    def playReleaseRequested =
        requested.contains("playrelease") ||
        requested.contains("bundleplayrelease") ||
        requested.contains("assembleplayrelease")

    if (playReleaseRequested) {
        def hasSigning =
            (System.getenv("XMILO_RELEASE_STORE_FILE") ?: findProperty("XMILO_RELEASE_STORE_FILE")) &&
            (System.getenv("XMILO_RELEASE_STORE_PASSWORD") ?: findProperty("XMILO_RELEASE_STORE_PASSWORD")) &&
            (System.getenv("XMILO_RELEASE_KEY_ALIAS") ?: findProperty("XMILO_RELEASE_KEY_ALIAS")) &&
            (System.getenv("XMILO_RELEASE_KEY_PASSWORD") ?: findProperty("XMILO_RELEASE_KEY_PASSWORD"))

        if (!hasSigning) {
            throw new GradleException("Play release signing is not configured. Set XMILO_RELEASE_STORE_FILE, XMILO_RELEASE_STORE_PASSWORD, XMILO_RELEASE_KEY_ALIAS, XMILO_RELEASE_KEY_PASSWORD.")
        }
    }
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

// Apply static values from `gradle.properties` to the `android.packagingOptions`
// Accepts values in comma delimited lists, example:
// android.packagingOptions.pickFirsts=/LICENSE,**/picasa.ini
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    // Split option: 'foo,bar' -> ['foo', 'bar']
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    // Trim all elements in place.
    for (i in 0..<options.size()) options[i] = options[i].trim();
    // `[] - ""` is essentially `[""].filter(Boolean)` removing all empty strings.
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        // Ex: android.packagingOptions.pickFirsts += '**/SCCS/**'
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

android.packagingOptions.doNotStrip += "**/libxmilo_sidecar.so"

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation(name: "castle", ext: "aar")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        // For animated gif support
        implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // For webp support
        implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            // Animated webp support
            implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

tasks.register("syncXmiloMindRootAssets", Copy) {
    group = "xmilo"
    description = "Copies the required xMilo_v1 authority markdown files into Android assets."
    def sourceDir = file("${xmiloRepoRoot}/docs/authority/xMilo_v1")
    def targetDir = file("src/main/assets/mind/xMilo_v1")

    from(sourceDir) {
        include xmiloRequiredMindFiles
    }
    into(targetDir)
}

preBuild.dependsOn("syncXmiloMindRootAssets")

def castleForbiddenNativeMarkers = [
    "MILO DRAW",
    "PROP DRAW",
    "ASSET LOAD TRY",
    "ASSET LOAD FAIL",
    "XMILO_OVERVIEW_BASIC_PROOF",
    "GO_DRAW_BUILD_ID",
]

def castleBytesContain = { byte[] haystack, byte[] needle ->
    if (needle.length == 0 || haystack.length < needle.length) {
        return false
    }
    for (int i = 0; i <= haystack.length - needle.length; i++) {
        boolean matched = true
        for (int j = 0; j < needle.length; j++) {
            if (haystack[i + j] != needle[j]) {
                matched = false
                break
            }
        }
        if (matched) {
            return true
        }
    }
    return false
}

def castleAssertNoForbiddenMarkers = { byte[] bytes, String label ->
    def hits = castleForbiddenNativeMarkers.findAll { marker ->
        castleBytesContain(bytes, marker.getBytes("US-ASCII"))
    }
    if (!hits.isEmpty()) {
        throw new GradleException("Forbidden castle native marker(s) found in ${label}: ${hits.join(', ')}. Rebuild castle.aar and rebuild the APK before device validation.")
    }
    println "PASS: ${label}"
}

def castleReadZipEntryBytes = { File zipFile, String entryName, String label ->
    if (!zipFile.exists()) {
        throw new GradleException("${label} not found: ${zipFile}")
    }
    def zip = new java.util.zip.ZipFile(zipFile)
    try {
        def entry = zip.getEntry(entryName)
        if (entry == null) {
            throw new GradleException("${label} entry not found: ${entryName}")
        }
        return zip.getInputStream(entry).bytes
    } finally {
        zip.close()
    }
}

def castleReadFileBytes = { File nativeFile, String label ->
    if (!nativeFile.exists()) {
        throw new GradleException("${label} not found: ${nativeFile}")
    }
    return nativeFile.bytes
}

tasks.register("verifyCastleNativeArtifactsInternalDebug") {
    group = "verification"
    description = "Verifies internalDebug castle native artifacts do not contain stale Go probe/log markers."
    dependsOn("packageInternalDebug")

    doLast {
        def aarFile = file("libs/castle.aar")
        def mergedLib = file("${buildDir}/intermediates/merged_native_libs/internalDebug/mergeInternalDebugNativeLibs/out/lib/arm64-v8a/libgojni.so")
        def strippedLib = file("${buildDir}/intermediates/stripped_native_libs/internalDebug/stripInternalDebugDebugSymbols/out/lib/arm64-v8a/libgojni.so")
        def apkFile = file("${buildDir}/outputs/apk/internal/debug/app-internal-debug.apk")

        println "Verifying castle native artifacts for internalDebug..."
        castleAssertNoForbiddenMarkers(
            castleReadZipEntryBytes(aarFile, "jni/arm64-v8a/libgojni.so", "castle.aar jni/arm64-v8a/libgojni.so"),
            "castle.aar jni/arm64-v8a/libgojni.so"
        )
        castleAssertNoForbiddenMarkers(
            castleReadFileBytes(mergedLib, "merged native lib arm64-v8a/libgojni.so"),
            "merged native lib arm64-v8a/libgojni.so"
        )
        castleAssertNoForbiddenMarkers(
            castleReadFileBytes(strippedLib, "stripped native lib arm64-v8a/libgojni.so"),
            "stripped native lib arm64-v8a/libgojni.so"
        )
        castleAssertNoForbiddenMarkers(
            castleReadZipEntryBytes(apkFile, "lib/arm64-v8a/libgojni.so", "final APK lib/arm64-v8a/libgojni.so"),
            "final APK lib/arm64-v8a/libgojni.so"
        )
        println "PASS: castle native artifact integrity verified."
        println "APK: ${apkFile}"
    }
}

tasks.register("verifySidecarExecutableAssetInternalDebug") {
    group = "verification"
    description = "Verifies the internalDebug sidecar native-library payload is present and packaged."
    dependsOn("packageInternalDebug")

    doLast {
        def expectedSha256 = "9FC73A183DABF33F463B8AEB46EF3D22472DFF9E3A12824BD1D78A1774DDC121"
        def sidecarPayload = file("src/main/jniLibs/arm64-v8a/libxmilo_sidecar.so")
        def apkFile = file("${buildDir}/outputs/apk/internal/debug/app-internal-debug.apk")
        def apkEntry = "lib/arm64-v8a/libxmilo_sidecar.so"

        if (!sidecarPayload.exists()) {
            throw new GradleException("Sidecar native-library payload missing: ${sidecarPayload}")
        }
        if (sidecarPayload.length() <= 0) {
            throw new GradleException("Sidecar native-library payload is empty: ${sidecarPayload}")
        }

        def hashBytes = { byte[] bytes ->
            def digest = java.security.MessageDigest.getInstance("SHA-256")
            digest.update(bytes)
            return digest.digest().collect { String.format("%02X", it) }.join("")
        }

        def digest = java.security.MessageDigest.getInstance("SHA-256")
        sidecarPayload.withInputStream { input ->
            byte[] buffer = new byte[8192]
            int read
            while ((read = input.read(buffer)) != -1) {
                digest.update(buffer, 0, read)
            }
        }
        def actualSha256 = digest.digest().collect { String.format("%02X", it) }.join("")
        if (actualSha256 != expectedSha256) {
            throw new GradleException("Sidecar executable SHA-256 mismatch. Expected ${expectedSha256}, got ${actualSha256}.")
        }

        def zip = new java.util.zip.ZipFile(apkFile)
        try {
            def entry = zip.getEntry(apkEntry)
            if (entry == null) {
                throw new GradleException("Sidecar native-library payload not packaged in APK: ${apkEntry}")
            }
            if (entry.size <= 0) {
                throw new GradleException("Packaged sidecar native-library payload is empty: ${apkEntry}")
            }
            def packagedSha256 = hashBytes(zip.getInputStream(entry).bytes)
            if (packagedSha256 != expectedSha256) {
                throw new GradleException("Packaged sidecar native-library SHA-256 mismatch. Expected ${expectedSha256}, got ${packagedSha256}.")
            }
            println "PASS: sidecar native-library payload verified."
            println "Payload: ${sidecarPayload}"
            println "SHA-256: ${actualSha256}"
            println "APK entry: ${apkEntry} (${entry.size} bytes)"
            println "APK: ${apkFile}"
        } finally {
            zip.close()
        }
    }
}

tasks.register("verifyXmiloMindRootAssetsInternalDebug") {
    group = "verification"
    description = "Verifies the internalDebug APK contains the required xMilo_v1 mind root markdown files."
    dependsOn("packageInternalDebug")

    doLast {
        def sourceDir = file("${xmiloRepoRoot}/docs/authority/xMilo_v1")
        def packagedAssetDir = file("src/main/assets/mind/xMilo_v1")
        def apkFile = file("${buildDir}/outputs/apk/internal/debug/app-internal-debug.apk")

        def zip = new java.util.zip.ZipFile(apkFile)
        try {
            xmiloRequiredMindFiles.each { filename ->
                def sourceFile = new File(sourceDir, filename)
                def packagedFile = new File(packagedAssetDir, filename)
                def apkEntryName = "assets/mind/xMilo_v1/${filename}"
                if (!sourceFile.exists()) {
                    throw new GradleException("Required xMilo mind source file missing: ${sourceFile}")
                }
                if (sourceFile.length() <= 0) {
                    throw new GradleException("Required xMilo mind source file is empty: ${sourceFile}")
                }
                if (!packagedFile.exists()) {
                    throw new GradleException("Required xMilo mind packaged asset missing: ${packagedFile}")
                }
                if (packagedFile.length() <= 0) {
                    throw new GradleException("Required xMilo mind packaged asset is empty: ${packagedFile}")
                }
                def entry = zip.getEntry(apkEntryName)
                if (entry == null) {
                    throw new GradleException("Required xMilo mind file not packaged in APK: ${apkEntryName}")
                }
                if (entry.size <= 0) {
                    throw new GradleException("Required xMilo mind APK entry is empty: ${apkEntryName}")
                }
                println "PASS: xMilo mind file packaged: ${filename} (${entry.size} bytes)"
            }
            println "PASS: xMilo_v1 mind root assets verified."
            println "APK: ${apkFile}"
        } finally {
            zip.close()
        }
    }
}
